name: Debug CI

on:
  push:
    branches: ["main"]

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node version
        run: node -v

      - name: NPM version
        run: npm -v

      - name: List files
        run: ls -la

      - name: Install dependencies
        run: npm install

      - name: Check node_modules
        run: ls node_modules

      - name: Check Jest
        run: npx jest --version

      - name: Run tests (debug)
        run: npx jest --detectOpenHandles --verbose